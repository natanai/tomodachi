<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tomodachi Life Mii Personality Planner</title>
  <meta name="description" content="Plan Tomodachi Life Mii personalities by selecting a target and matching valid slider combinations." />

  <meta property="og:title" content="Tomodachi Life Mii Personality Planner" />
  <meta property="og:description" content="Pick a personality, match valid slider values, and get the exact Mii personality result." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://natanai.github.io/tomodachi/" />
  <meta property="og:image" content="https://natanai.github.io/tomodachi/social-preview.svg" />
  <meta property="og:image:secure_url" content="https://natanai.github.io/tomodachi/social-preview.svg" />
  <meta property="og:image:type" content="image/svg+xml" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Tomodachi Life Mii Personality Planner" />
  <meta name="twitter:description" content="Pick a personality, match valid slider values, and get the exact Mii personality result." />
  <meta name="twitter:image" content="https://natanai.github.io/tomodachi/social-preview.svg" />

  <meta name="theme-color" content="#e60012" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Tomodachi" />

  <link rel="icon" type="image/svg+xml" href="/tomodachi/pull-icon.svg" />
  <link rel="shortcut icon" href="/tomodachi/pull-icon.svg" />
  <link rel="apple-touch-icon" href="/tomodachi/pull-icon.svg" />
  <link rel="manifest" href="/tomodachi/site.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1 id="pageTitle">Tomodachi Life Mii Personality Planner</h1>
    <p id="pageSubtitle" class="subtitle"></p>

    <section class="panel controls">
      <label id="regionLabel" for="regionSelect">Region</label>
      <select id="regionSelect"></select>

      <label id="personalityLabel" for="personalitySelect">Target personality</label>
      <select id="personalitySelect"></select>
      <p id="goalBands" class="description"></p>
      <p id="hintText" class="hint" aria-hidden="true"></p>
    </section>

    <section class="panel sliders-panel">
      <h2 id="slidersHeading">Set your sliders</h2>
      <p id="weightingNote" class="weighting-note">As you make selections, invalid options for the selected target personality will be grayed out.</p>
      <div id="sliderGrid" class="slider-grid"></div>
    </section>

    <section class="panel breakdown">
      <h2 id="resultHeading">Result</h2>
      <p><strong id="currentResultLabel">Current result:</strong> <span id="currentResult">Select Movement, Speech, Energy, and Attitude to see your result.</span></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
