<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Tomodachi Personality Planner</title>
  <meta name="description" content="Simple Tomodachi Life personality planner." />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Tomodachi" />
  <meta property="og:title" content="Tomodachi Personality Planner" />
  <meta property="og:description" content="Pick a personality target and match slider values." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/social-preview.svg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Tomodachi Personality Planner" />
  <meta name="twitter:description" content="Pick a personality target and match slider values." />
  <meta name="twitter:image" content="/social-preview.svg" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/social-preview.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1 id="pageTitle">Tomodachi Personality Planner</h1>

    <section class="panel controls">
      <label id="regionLabel" for="regionSelect">Region</label>
      <select id="regionSelect"></select>

      <label id="personalityLabel" for="personalitySelect">Target personality</label>
      <select id="personalitySelect"></select>
      <p id="goalBands" class="description"></p>
      <p id="hintText" class="hint">Tap a number to select it.</p>
    </section>

    <section class="panel sliders-panel">
      <h2 id="slidersHeading">Sliders</h2>
      <div id="sliderGrid" class="slider-grid"></div>
    </section>

    <section class="panel breakdown">
      <h2 id="resultHeading">Result</h2>
      <p><strong id="currentResultLabel">Current result:</strong> <span id="currentResult">Select Movement, Speech, Energy, and Attitude to see your result.</span></p>
      <p><strong id="msSumLabel">Movement + Speech:</strong> <span id="msSum">—</span></p>
      <p><strong id="eaSumLabel">Energy + Attitude:</strong> <span id="eaSum">—</span></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
